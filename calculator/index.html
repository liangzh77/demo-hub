<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .calculator {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            width: 340px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .display {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 24px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-end;
            overflow: hidden;
        }
        .expression {
            color: rgba(255,255,255,0.5);
            font-size: 1em;
            margin-bottom: 8px;
            min-height: 1.2em;
            word-break: break-all;
        }
        .result {
            color: #fff;
            font-size: 2.4em;
            font-weight: 300;
            word-break: break-all;
            transition: font-size 0.2s;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .btn {
            border: none;
            border-radius: 14px;
            font-size: 1.3em;
            padding: 18px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.92); }
        .btn-num {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .btn-num:hover { background: rgba(255,255,255,0.2); }
        .btn-op {
            background: rgba(255,153,51,0.8);
            color: #fff;
            font-weight: 600;
        }
        .btn-op:hover { background: rgba(255,153,51,1); }
        .btn-func {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        .btn-func:hover { background: rgba(255,255,255,0.3); }
        .btn-eq {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-weight: 600;
        }
        .btn-eq:hover { background: linear-gradient(135deg, #7b93ff, #8b5fbf); }
        .btn-zero { grid-column: span 2; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.85em;
        }
        .back-link:hover { color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>
    <div>
        <div class="calculator">
            <div class="display">
                <div class="expression" id="expression"></div>
                <div class="result" id="result">0</div>
            </div>
            <div class="buttons">
                <button class="btn btn-func" onclick="clearAll()">AC</button>
                <button class="btn btn-func" onclick="toggleSign()">±</button>
                <button class="btn btn-func" onclick="percent()">%</button>
                <button class="btn btn-op" onclick="setOp('÷')">÷</button>

                <button class="btn btn-num" onclick="inputNum('7')">7</button>
                <button class="btn btn-num" onclick="inputNum('8')">8</button>
                <button class="btn btn-num" onclick="inputNum('9')">9</button>
                <button class="btn btn-op" onclick="setOp('×')">×</button>

                <button class="btn btn-num" onclick="inputNum('4')">4</button>
                <button class="btn btn-num" onclick="inputNum('5')">5</button>
                <button class="btn btn-num" onclick="inputNum('6')">6</button>
                <button class="btn btn-op" onclick="setOp('−')">−</button>

                <button class="btn btn-num" onclick="inputNum('1')">1</button>
                <button class="btn btn-num" onclick="inputNum('2')">2</button>
                <button class="btn btn-num" onclick="inputNum('3')">3</button>
                <button class="btn btn-op" onclick="setOp('+')">+</button>

                <button class="btn btn-num btn-zero" onclick="inputNum('0')">0</button>
                <button class="btn btn-num" onclick="inputDot()">.</button>
                <button class="btn btn-eq" onclick="calculate()">=</button>
            </div>
        </div>
        <a href="/" class="back-link">← 返回 Demo Hub</a>
    </div>

    <script>
        let current = '0';
        let previous = '';
        let operator = '';
        let shouldReset = false;

        const resultEl = document.getElementById('result');
        const exprEl = document.getElementById('expression');

        function updateDisplay() {
            resultEl.textContent = current;
            resultEl.style.fontSize = current.length > 10 ? '1.6em' : '2.4em';
        }

        function inputNum(n) {
            if (shouldReset) { current = ''; shouldReset = false; }
            if (current === '0' && n !== '0') { current = n; }
            else if (current === '0' && n === '0') { /* noop */ }
            else { current += n; }
            updateDisplay();
        }

        function inputDot() {
            if (shouldReset) { current = '0'; shouldReset = false; }
            if (!current.includes('.')) { current += '.'; }
            updateDisplay();
        }

        function setOp(op) {
            if (operator && !shouldReset) { calculate(); }
            previous = current;
            operator = op;
            shouldReset = true;
            exprEl.textContent = `${previous} ${operator}`;
        }

        function calculate() {
            if (!operator || shouldReset) return;
            const a = parseFloat(previous);
            const b = parseFloat(current);
            let r;
            switch (operator) {
                case '+': r = a + b; break;
                case '−': r = a - b; break;
                case '×': r = a * b; break;
                case '÷': r = b === 0 ? 'Error' : a / b; break;
            }
            exprEl.textContent = `${previous} ${operator} ${current} =`;
            if (r === 'Error') { current = 'Error'; }
            else {
                // 避免浮点精度问题
                current = parseFloat(r.toPrecision(12)).toString();
            }
            operator = '';
            previous = '';
            shouldReset = true;
            updateDisplay();
        }

        function clearAll() {
            current = '0'; previous = ''; operator = '';
            shouldReset = false;
            exprEl.textContent = '';
            updateDisplay();
        }

        function toggleSign() {
            if (current === '0' || current === 'Error') return;
            current = current.startsWith('-') ? current.slice(1) : '-' + current;
            updateDisplay();
        }

        function percent() {
            if (current === 'Error') return;
            current = (parseFloat(current) / 100).toString();
            updateDisplay();
        }

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') inputNum(e.key);
            else if (e.key === '.') inputDot();
            else if (e.key === '+') setOp('+');
            else if (e.key === '-') setOp('−');
            else if (e.key === '*') setOp('×');
            else if (e.key === '/') { e.preventDefault(); setOp('÷'); }
            else if (e.key === 'Enter' || e.key === '=') calculate();
            else if (e.key === 'Escape') clearAll();
            else if (e.key === 'Backspace') {
                if (current.length > 1) current = current.slice(0, -1);
                else current = '0';
                updateDisplay();
            }
        });
    </script>
</body>
</html>
